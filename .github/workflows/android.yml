name: Android Build

name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build with Buildozer (Docker)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          # se seu main.py e buildozer.spec estão na raiz do repo, deixe workdir: .
          workdir: .
          buildozer_version: stable
          buildozer_cmd: "android debug"

      - name: Upload APK artifact
        if: success() && steps.buildozer.outputs.filename != ''
        uses: actions/upload-artifact@v4
        with:
          name: mlcounterpro-apk
          path: ${{ steps.buildozer.outputs.filename }}
